# STT configuration
# Copy to ~/.config/stt/config.yml, or run `stt` and the setup wizard
# will create one for you.
#
# Docs: https://github.com/jamesob/stt

# -- General ----------------------------------------------------------

# Trigger key: cmd_r, cmd_l, alt_r, alt_l, ctrl_r, ctrl_l, shift_r
hotkey: cmd_r

# Language code for transcription
language: en

# Audio device name (omit for system default)
# audio_device: MacBook Pro Microphone

# Context prompt -- improves accuracy for domain-specific terms.
# Also used for phonetic correction with the Parakeet provider.
# prompt: Claude, Anthropic, TypeScript, React

# Audio feedback sounds
sound_enabled: true

# Save recordings to ~/.config/stt/recordings/
keep_recordings: false

# Run all backends in parallel and log timing (for comparison)
# benchmark: true

# -- Backends ---------------------------------------------------------
# Each backend defines a transcription provider.
# Available providers: mlx, openai, whisper-cpp-http, groq, parakeet

backends:
  default:
    provider: openai
    openai_base_url: http://localhost:8000
    # openai_api_key: sk-...
    openai_whisper_model: whisper-large-v3

    # MLX Whisper (macOS, local)
    # provider: mlx
    # whisper_model: large-v3

    # Parakeet (macOS, local, English only)
    # provider: parakeet
    # parakeet_model: mlx-community/parakeet-tdt-0.6b-v3

    # Whisper.cpp HTTP server
    # provider: whisper-cpp-http
    # whisper_cpp_http_url: http://localhost:8080

    # Groq Cloud
    # provider: groq
    # groq_api_key: gsk_...

# -- Order ------------------------------------------------------------
# Backends are tried in this order. If a backend with connect_timeout
# is unreachable, the next one is used.

order:
  - default

# -- Advanced: fallback chain -----------------------------------------
# Multiple backends with automatic failover:
#
# backends:
#   remote:
#     provider: openai
#     openai_base_url: http://gpu-server:8200
