# STT benchmark configuration
# All backends run in parallel; the first in `order:` is the primary
# (its result is returned). Timing is logged for comparison.
#
# Copy to ~/.config/stt/config.yml or use as-is in the project root.

hotkey: cmd_r
language: en
sound_enabled: true
keep_recordings: false
benchmark: true

backends:
  qwen:
    provider: openai
    openai_base_url: http://gpu-server:8200
    openai_whisper_model: Qwen/Qwen3-ASR-1.7B
    connect_timeout: 2
  whisper:
    provider: openai
    openai_base_url: http://gpu-server:8201
    openai_whisper_model: openai/whisper-large-v3
    connect_timeout: 2
  local:
    provider: mlx
    whisper_model: large-v3-turbo

order:
  - whisper
  - qwen
  - local
